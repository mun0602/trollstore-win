name: Build Windows Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Python CLI with PyInstaller
      run: |
        pyinstaller TrollRestore.spec

    - name: Verify PyInstaller Build
      shell: pwsh
      run: |
        if (Test-Path "dist/TrollRestore.exe") {
          Write-Host "[+] PyInstaller build successful!"
          Copy-Item "dist/TrollRestore.exe" -Destination "./"
          Write-Host "[+] Copied TrollRestore.exe to root directory."
        } else {
          Write-Error "[-] Failed to locate dist/TrollRestore.exe!"
          exit 1
        }

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore C# Dependencies
      run: dotnet restore TrollRestoreWin.csproj

    - name: Publish Windows App
      run: |
        dotnet publish TrollRestoreWin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o publish/

    - name: Verify Published Files
      shell: pwsh
      run: |
        Get-ChildItem -Path publish/

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestoreWin-x64
        path: publish/
