name: Build Windows Application

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Python CLI with PyInstaller
      run: |
        pyinstaller TrollRestore.spec

    - name: Verify PyInstaller Build
      shell: pwsh
      run: |
        if (Test-Path "dist/TrollRestore.exe") {
          Write-Host "[+] PyInstaller build successful!"
          Copy-Item "dist/TrollRestore.exe" -Destination "./"
          Write-Host "[+] Copied TrollRestore.exe to root directory."
        } else {
          Write-Error "[-] Failed to locate dist/TrollRestore.exe!"
          exit 1
        }

    - name: Restore C# Dependencies
      run: dotnet restore TrollRestoreWin.csproj

    - name: Publish Windows App
      run: |
        dotnet publish TrollRestoreWin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o publish/

    - name: Create Release Zip
      shell: pwsh
      run: |
        Compress-Archive -Path publish/* -DestinationPath TrollRestoreWin-x64.zip

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrollRestoreWin-x64
        path: publish/

    - name: Create Release
      if: github.event_name == 'push'
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "v1.0.${{ github.run_number }}"
        $title = "TrollRestoreWin $tag"
        gh release create $tag TrollRestoreWin-x64.zip --title $title --notes "Auto build from commit ${{ github.sha }}" --latest
